<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/orcamento.css">
    <title>Orçamento</title>
</head>

<body>
    <div class="container">
        <header>
            <div id="logo">
                <img src="../assets/images/logo.png" alt="Logo Lavagem">
            </div>
            <div id="voltar">
                <a href="../index.html">
                    <p>Página Inicial</p>
                </a>
            </div>
        </header>
        <section id="orcamento">
            <div id="conteudo">
                <h2>Formúlario de Orçamento</h2>
                <p>Preencha os dados abaixo e solicite seu orçamento pelo WhatsApp.</p>

                <form id="form-orcamento">

                    <div class="campo">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" placeholder="Digite seu nome" required>
                    </div>

                    <div class="campo">
                        <label for="telefone">Telefone</label>
                        <input type="tel" id="telefone" placeholder="(51) 99999-9999" required>
                    </div>

                    <div class="campo">
                        <label for="cep">CEP</label>
                        <input type="text" id="cep" placeholder="00000-000" maxlength="9" required>
                    </div>

                    <div class="campo">
                        <label for="logradouro">Rua</label>
                        <input type="text" id="logradouro" readonly>
                    </div>

                    <div class="linha">
                        <div class="campo">
                            <label for="numero">Número</label>
                            <input type="text" id="numero">
                        </div>

                        <div class="campo">
                            <label for="complemento">Complemento</label>
                            <input type="text" id="complemento">
                        </div>
                    </div>

                    <div class="linha">

                        <div class="campo">
                            <label for="bairro">Bairro</label>
                            <input type="text" id="bairro" readonly>
                        </div>

                        <div class="campo">
                            <label for="cidade">Cidade</label>
                            <input type="text" id="cidade" readonly>
                        </div>

                        <div class="campo uf">
                            <label for="uf">UF</label>
                            <input type="text" id="uf" readonly>
                        </div>

                    </div>

                    <div class="campo">
                        <label>Serviços desejados:</label>

                        <div class="checkbox">
                            <label>
                                <input type="checkbox" name="servicos" value="Lavagem Completa">
                                Lavagem Completa
                            </label>

                            <label>
                                <input type="checkbox" name="servicos" value="Lavagem Interna">
                                Lavagem Interna
                            </label>

                            <label>
                                <input type="checkbox" name="servicos" value="Polimento">
                                Polimento
                            </label>

                            <label>
                                <input type="checkbox" name="servicos" value="Lavagem de Motor">
                                Lavagem de Motor
                            </label>
                        </div>
                    </div>

                    <div class="campo">
                        <label for="observacoes">Observações</label>
                        <textarea id="observacoes" rows="5" placeholder="Escreva alguma observação..."></textarea>
                    </div>

                    <button type="submit">
                        Solicitar Orçamento
                    </button>

                </form>
            </div>



        </section>
    </div>
    <footer>
        <div id="superior">
            <div>
                <img src="../assets/icons/localização.png" alt="local">
                <p>Rua José Luis Schroeder, 342 - Rio Branco <br>São Leopoldo - RS</p>
            </div>
            <div id="juntas">
                <div>
                    <a href="https://wa.me/5551993539161">
                        <img src="../assets/icons/whatsappFooter.png" alt="icone WhatsApp">
                        <p>(51) 99353 - 9161</p>
                    </a>
                </div>
                <div>
                    <a href="#">
                        <img src="../assets/icons/instagram.png" alt="icone instagram">
                        <p>@equipegriffcar</p>
                    </a>
                </div>

            </div>
            <div>
                <h3>Brilho que se vê, cuidado que se sente!</h3>
            </div>


        </div>
        <span>
            <p>&copy; 2026 Meu Site. Todos os direitos reservados.</p>
        </span>
    </footer>
</body>

</html>
